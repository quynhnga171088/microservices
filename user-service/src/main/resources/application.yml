server:
  port: 8081

spring:
  application:
    name: user-service

  cloud:
    consul:
      host: localhost
      port: 8500

      discovery:
        register: true
        health-check-path: /actuator/health
        health-check-interval: 10s

management:
  endpoints:
    web:
      exposure:
        include: health

  endpoint:
    health:
      show-details: always