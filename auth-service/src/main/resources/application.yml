server:
  port: 8084

spring:
  application:
    name: auth-service

  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        register: true
        deregister: true
        instance-id: ${spring.application.name}:${server.port}
        health-check-path: /actuator/health
        health-check-interval: 10s

  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/lms_db
    username: lms_user
    password: lms_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # none — không tạo/sửa/validate schema, dùng bảng users sẵn có
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      # Gửi type header để consumer biết deserialize sang class nào
      properties:
        spring.json.add.type.headers: true

jwt:
  # Secret phải >= 32 ký tự (256-bit) cho HS256
  # Phải GIỐNG HỆT với jwt.secret trong gateway-service
  secret: "microservices-jwt-secret-key-for-lms-app-do-not-expose-this-2024"
  expiration: 86400000  # 24 giờ tính bằng milliseconds

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
